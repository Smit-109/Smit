<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smit Patel</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#0A0E14',
                        gold: '#D4AF37',
                        ether: '#7DF9FF',
                        charcoal: '#1A1E24',
                        'glass-bg': 'rgba(26, 30, 36, 0.4)',
                        'glass-border': 'rgba(125, 249, 255, 0.15)',
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        mono: ['Space Grotesk', 'monospace'],
                    }
                }
            }
        }
    </script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- GSAP & ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body class="bg-navy text-gray-200 overflow-x-hidden antialiased font-sans selection:bg-ether selection:text-navy">

    <!-- Particle Canvas Background -->
    <canvas id="particle-canvas" class="fixed inset-0 pointer-events-none z-0 opacity-50"></canvas>

    <!-- HERO SECTION -->
    <section id="hero" class="relative min-h-screen flex items-center justify-center overflow-hidden z-10 w-full px-4">
        
        <!-- Sacred Geometry Centerpiece -->
        <div id="sacred-geometry" class="absolute inset-0 flex items-center justify-center opacity-70 mix-blend-screen pointer-events-none">
            <!-- Mandala SVG -->
            <svg class="w-[80vmin] h-[80vmin] origin-center" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <g stroke="#7DF9FF" stroke-width="0.5" fill="none" class="sacred-paths">
                    <circle cx="100" cy="100" r="80" stroke-opacity="0.3"></circle>
                    <polygon points="100,20 169.28,60 169.28,140 100,180 30.72,140 30.72,60" stroke-opacity="0.5"></polygon>
                    <polygon points="100,20 30.72,140 169.28,140" stroke-opacity="0.4"></polygon>
                    <polygon points="100,180 169.28,60 30.72,60" stroke-opacity="0.4"></polygon>
                    <!-- Inner Hexagon -->
                    <polygon points="100,60 134.64,80 134.64,120 100,140 65.36,120 65.36,80" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.8"></polygon>
                    <!-- Inner star -->
                    <polygon points="100,60 65.36,120 134.64,120" stroke="#D4AF37" stroke-opacity="0.6" stroke-width="0.5"></polygon>
                    <polygon points="100,140 134.64,80 65.36,80" stroke="#D4AF37" stroke-opacity="0.6" stroke-width="0.5"></polygon>
                </g>
            </svg>
        </div>

        <!-- Glassmorphism Card (Dynamic) -->
        <div class="glass-card relative z-20 max-w-2xl w-full p-10 md:p-14 rounded-3xl text-center transform-gpu mt-12 md:mt-0 hero-content" id="hero-container">
            <!-- Content Injected via JS -->
        </div>

        <!-- Scroll Indicator -->
        <div class="absolute bottom-10 left-1/2 -translate-x-1/2 flex flex-col items-center opacity-0 z-20" id="scroll-indicator">
            <span class="text-xs text-gray-500 uppercase tracking-widest mb-2 font-mono">Journey</span>
            <div class="w-[1px] h-12 bg-gradient-to-b from-transparent via-gold to-transparent scroll-line"></div>
        </div>
    </section>

    <!-- ASCENSION TIMELINE SECTION -->
    <section id="ascension" class="relative py-32 z-10">
        <div class="max-w-4xl mx-auto px-6">
            <div class="text-center mb-24 section-header">
                <h2 class="text-4xl md:text-5xl font-bold text-white mb-4">The Ascension Path</h2>
                <div class="h-1 w-24 bg-gradient-to-r from-navy via-gold to-navy mx-auto"></div>
            </div>

            <!-- Timeline Container (Dynamic) -->
            <div id="timeline-container" class="relative timeline-container border-l border-gold/30 ml-4 md:ml-1/2 md:translate-x-[-1px]">
                <!-- Content Injected via JS -->
            </div>
        </div>
    </section>

    <!-- SKILLS & PROJECTS (ELEMENTAL GRID) -->
    <section id="elemental-grid-section" class="relative py-32 z-10 bg-navy/50">
        <div class="max-w-6xl mx-auto px-6">
            <div class="text-center mb-20 section-header">
                <h2 class="text-4xl md:text-5xl font-bold text-white mb-4">Elemental Arsenal</h2>
                <div class="h-1 w-24 bg-gradient-to-r from-navy via-ether to-navy mx-auto"></div>
                <p class="text-gray-400 mt-6 max-w-2xl mx-auto">Manifesting concepts through foundational elements.</p>
            </div>

            <!-- Grid Container (Dynamic) -->
            <div id="elemental-grid-container" class="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12">
                <!-- Content Injected via JS -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="py-10 text-center border-t border-glass-border bg-charcoal/30 relative z-10 flex flex-col items-center">
        <p id="footer-text" class="text-gray-500 text-sm font-mono"></p>
    </footer>

    <!-- Scripts -->
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
